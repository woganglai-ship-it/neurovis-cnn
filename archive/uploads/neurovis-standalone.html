<script>
// 手设的 3x3 滤波器，用于第一层卷积 conv_1_1
// 每个滤波器作用于 RGB 3 通道，输出 1 个 channel。10 个滤波器 → 10 个输出 channel。
// 这些是教科书里可解释的核：能在熊猫/茶/地铁等不同 emoji 上产生有意义、可识别的特征图。
window.HAND_FILTERS_3x3 = [
  // 0: Sobel X — 水平梯度 (检测竖直边缘)
  [[-1, 0, 1],
   [-2, 0, 2],
   [-1, 0, 1]],

  // 1: Sobel Y — 垂直梯度 (检测水平边缘)
  [[-1, -2, -1],
   [ 0,  0,  0],
   [ 1,  2,  1]],

  // 2: Laplacian — 全方向边缘 / 高频
  [[ 0, -1,  0],
   [-1,  4, -1],
   [ 0, -1,  0]],

  // 3: Gaussian blur (1/16 系数)
  [[1/16, 2/16, 1/16],
   [2/16, 4/16, 2/16],
   [1/16, 2/16, 1/16]],

  // 4: Sharpen
  [[ 0, -1,  0],
   [-1,  5, -1],
   [ 0, -1,  0]],

  // 5: 对角边缘 ↘
  [[-2, -1,  0],
   [-1,  1,  1],
   [ 0,  1,  2]],

  // 6: 对角边缘 ↙
  [[ 0,  1,  2],
   [-1,  1,  1],
   [-2, -1,  0]],

  // 7: Emboss (浮雕)
  [[-2, -1,  0],
   [-1,  1,  1],
   [ 0,  1,  2]],

  // 8: 高通 (检测细节/纹理)
  [[ -1, -1, -1],
   [ -1,  8, -1],
   [ -1, -1, -1]],

  // 9: Identity-ish (温和恒等 + 一点边缘)
  [[ 0,  0,  0],
   [ 0,  1,  0],
   [ 0,  0,  0]],
];

// 每个 filter 对 R/G/B 三通道分别给一个权重 (用于强调某个色道)
// 形状: [10 filters][3 channels (R,G,B)]
window.HAND_FILTERS_RGB_MIX = [
  // 灰度 (对所有边缘/纹理类滤波器用灰度混合)
  [0.299, 0.587, 0.114], // 0 Sobel X — 灰度
  [0.299, 0.587, 0.114], // 1 Sobel Y — 灰度
  [0.299, 0.587, 0.114], // 2 Laplacian — 灰度
  [0.333, 0.333, 0.333], // 3 Gaussian — 平均
  [0.299, 0.587, 0.114], // 4 Sharpen — 灰度
  [0.299, 0.587, 0.114], // 5 对角 ↘ — 灰度
  [0.299, 0.587, 0.114], // 6 对角 ↙ — 灰度
  [ 0.8, -0.4, -0.4],    // 7 强调红
  [-0.4,  0.8, -0.4],    // 8 强调绿
  [-0.4, -0.4,  0.8],    // 9 强调蓝
];

</script>

<script>
/* global HAND_FILTERS_3x3, HAND_FILTERS_RGB_MIX */

// Tiny VGG forward pass，纯 JS 实现，不依赖任何外部库。
//
// 为什么不用 tfjs：
//   原来用 tf.layers + WebGL backend，在 mac Chrome 上正常，但在微信内置 WebView /
//   iOS Safari 上某些张量形状会塌缩或返回错的值（中间层特征图被渲染成纯色块），
//   且 tf.randomUniform 的种子在不同 backend 间不可复现，电脑/手机会拿到两套不同权重。
//   纯 JS 实现 + mulberry32 伪随机 → 跨平台完全确定性，64×64 输入 ~50ms 跑完。
//
// 数据格式：所有特征图都是 [H][W][C] 嵌套 JS 数组。
// 权重格式：conv 是 [kH][kW][inCh][outCh]，dense 是 [inSize][outSize]。

(function () {
  // ── 确定性伪随机 ───────────────────────────────────────────────
  function mulberry32(seed) {
    return function () {
      seed = (seed + 0x6D2B79F5) | 0;
      let t = seed;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // ── 权重生成 ──────────────────────────────────────────────────
  function buildConv1_1Weights() {
    // [3][3][3][10]：每个 outCh 用一个手设 3x3 核 × 对应的 RGB 混合系数
    const W = [];
    for (let y = 0; y < 3; y++) {
      W[y] = [];
      for (let x = 0; x < 3; x++) {
        W[y][x] = [];
        for (let ic = 0; ic < 3; ic++) {
          W[y][x][ic] = [];
          for (let oc = 0; oc < 10; oc++) {
            W[y][x][ic][oc] = HAND_FILTERS_3x3[oc][y][x] * HAND_FILTERS_RGB_MIX[oc][ic];
          }
        }
      }
    }
    return W;
  }

  function genConvWeights(inCh, outCh, seed) {
    const limit = Math.sqrt(6 / (3 * 3 * inCh + 3 * 3 * outCh));
    const rng = mulberry32(seed);
    const W = [];
    for (let y = 0; y < 3; y++) {
      W[y] = [];
      for (let x = 0; x < 3; x++) {
        W[y][x] = [];
        for (let ic = 0; ic < inCh; ic++) {
          W[y][x][ic] = [];
          for (let oc = 0; oc < outCh; oc++) {
            W[y][x][ic][oc] = (rng() * 2 - 1) * limit;
          }
        }
      }
    }
    return W;
  }

  function genDenseWeights(inSize, outSize, seed) {
    const limit = Math.sqrt(6 / (inSize + outSize));
    const rng = mulberry32(seed);
    const W = [];
    for (let n = 0; n < inSize; n++) {
      W[n] = [];
      for (let m = 0; m < outSize; m++) {
        W[n][m] = (rng() * 2 - 1) * limit;
      }
    }
    return W;
  }

  // ── 卷积 (3x3, VALID padding, stride=1) ──────────────────────
  function conv2d(input, kernel) {
    const H = input.length;
    const W = input[0].length;
    const inCh = input[0][0].length;
    const outCh = kernel[0][0][0].length;
    const outH = H - 2;
    const outW = W - 2;
    const out = new Array(outH);
    for (let y = 0; y < outH; y++) {
      const row = new Array(outW);
      for (let x = 0; x < outW; x++) {
        const acc = new Float32Array(outCh);
        for (let ky = 0; ky < 3; ky++) {
          for (let kx = 0; kx < 3; kx++) {
            const ipx = input[y + ky][x + kx];
            const kpx = kernel[ky][kx];
            for (let ic = 0; ic < inCh; ic++) {
              const v = ipx[ic];
              const kic = kpx[ic];
              for (let oc = 0; oc < outCh; oc++) {
                acc[oc] += v * kic[oc];
              }
            }
          }
        }
        row[x] = Array.from(acc);
      }
      out[y] = row;
    }
    return out;
  }

  function relu(input) {
    const H = input.length;
    const W = input[0].length;
    const ch = input[0][0].length;
    const out = new Array(H);
    for (let y = 0; y < H; y++) {
      const row = new Array(W);
      for (let x = 0; x < W; x++) {
        const px = new Array(ch);
        const ipx = input[y][x];
        for (let c = 0; c < ch; c++) px[c] = ipx[c] > 0 ? ipx[c] : 0;
        row[x] = px;
      }
      out[y] = row;
    }
    return out;
  }

  function maxpool2x2(input) {
    const H = input.length;
    const W = input[0].length;
    const ch = input[0][0].length;
    const outH = Math.floor(H / 2);
    const outW = Math.floor(W / 2);
    const out = new Array(outH);
    for (let y = 0; y < outH; y++) {
      const row = new Array(outW);
      for (let x = 0; x < outW; x++) {
        const px = new Array(ch).fill(-Infinity);
        for (let dy = 0; dy < 2; dy++) {
          for (let dx = 0; dx < 2; dx++) {
            const ipx = input[y * 2 + dy][x * 2 + dx];
            for (let c = 0; c < ch; c++) {
              if (ipx[c] > px[c]) px[c] = ipx[c];
            }
          }
        }
        row[x] = px;
      }
      out[y] = row;
    }
    return out;
  }

  function flatten(input) {
    const H = input.length;
    const W = input[0].length;
    const ch = input[0][0].length;
    const out = new Array(H * W * ch);
    let i = 0;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const px = input[y][x];
        for (let c = 0; c < ch; c++) out[i++] = px[c];
      }
    }
    return out;
  }

  function dense(input, weight) {
    const M = weight[0].length;
    const out = new Float32Array(M);
    for (let n = 0; n < input.length; n++) {
      const v = input[n];
      const row = weight[n];
      for (let m = 0; m < M; m++) out[m] += v * row[m];
    }
    return Array.from(out);
  }

  function softmax(input) {
    let max = -Infinity;
    for (const v of input) if (v > max) max = v;
    const exp = input.map(v => Math.exp(v - max));
    const sum = exp.reduce((a, b) => a + b, 0);
    return exp.map(v => v / sum);
  }

  // ── 模型权重（懒加载） ─────────────────────────────────────────
  let _weights = null;
  function getWeights() {
    if (_weights) return _weights;
    _weights = {
      conv_1_1: buildConv1_1Weights(),
      conv_1_2: genConvWeights(10, 10, 11),
      conv_2_1: genConvWeights(10, 10, 12),
      conv_2_2: genConvWeights(10, 10, 13),
      dense:    genDenseWeights(13 * 13 * 10, 10, 14),
    };
    return _weights;
  }

  // 输入: rgbInput [64][64][3]，值域 [0,1]
  // 输出: 各层激活的对象，key 与 LAYERS 的 id 对齐
  async function runForward(rgbInput) {
    const W = getWeights();
    const conv_1_1 = conv2d(rgbInput, W.conv_1_1);
    const relu_1_1 = relu(conv_1_1);
    const conv_1_2 = conv2d(relu_1_1, W.conv_1_2);
    const relu_1_2 = relu(conv_1_2);
    const pool_1   = maxpool2x2(relu_1_2);
    const conv_2_1 = conv2d(pool_1, W.conv_2_1);
    const relu_2_1 = relu(conv_2_1);
    const conv_2_2 = conv2d(relu_2_1, W.conv_2_2);
    const relu_2_2 = relu(conv_2_2);
    const pool_2   = maxpool2x2(relu_2_2);
    const flat     = flatten(pool_2);
    const logits   = dense(flat, W.dense);
    const output   = softmax(logits);
    return {
      conv_1_1, relu_1_1, conv_1_2, relu_1_2, pool_1,
      conv_2_1, relu_2_1, conv_2_2, relu_2_2, pool_2,
      output,
    };
  }

  // L2/L3 演示要拉某个 conv 层的 3x3 kernel 切片
  function getKernelSlice(layerId, outChIdx, inChIdx = 0) {
    const kernel = getWeights()[layerId];
    if (!kernel) return null;
    const slice = [];
    for (let y = 0; y < 3; y++) {
      const row = [];
      for (let x = 0; x < 3; x++) row.push(kernel[y][x][inChIdx][outChIdx]);
      slice.push(row);
    }
    return slice;
  }

  window.CNN = {
    runForward,
    getKernelSlice,
  };
})();

</script>

<script>
/* global CATEGORIES */

// 把每个 CATEGORY 的 emoji 渲染到 64x64 canvas，做成 CNN 的真实输入图像。
// - 背景用 CATEGORY.hue 调色（HSL → RGB），保证不同类别底色不同
// - emoji 用 Apple Color Emoji 渲染到中心，自然带 RGB 信息
// - 输出 [64][64][3] JS 数组，值归一化到 [0,1]，供纯 JS forward 直接消费
//
// 结果按 catIndex 缓存，切类别不重复渲染。

(function () {
  const SIZE = 64;
  const tensorCache = new Map();
  const rgbCache = new Map();

  function hslToRgb(h, s, l) {
    h /= 360; s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
      const k = (n + h * 12) % 12;
      return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    };
    return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
  }

  function renderEmojiToImageData(emoji, hue) {
    const canvas = document.createElement('canvas');
    canvas.width = SIZE;
    canvas.height = SIZE;
    const ctx = canvas.getContext('2d');

    const [r, g, b] = hslToRgb(hue, 60, 78);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, 0, SIZE, SIZE);

    const grad = ctx.createRadialGradient(SIZE * 0.3, SIZE * 0.3, 4, SIZE / 2, SIZE / 2, SIZE);
    grad.addColorStop(0, 'rgba(255,255,255,0.45)');
    grad.addColorStop(1, 'rgba(0,0,0,0.12)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, SIZE, SIZE);

    ctx.font = '48px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, SIZE / 2, SIZE / 2 + 2);

    return ctx.getImageData(0, 0, SIZE, SIZE);
  }

  // ImageData (RGBA uint8) → [64][64][3] JS 数组，归一化到 [0,1]
  function imageDataToTensor(imgData) {
    const { data } = imgData;
    const out = new Array(SIZE);
    for (let y = 0; y < SIZE; y++) {
      const row = new Array(SIZE);
      for (let x = 0; x < SIZE; x++) {
        const k = (y * SIZE + x) * 4;
        row[x] = [data[k] / 255, data[k + 1] / 255, data[k + 2] / 255];
      }
      out[y] = row;
    }
    return out;
  }

  // 返回 [64][64][3] JS 数组（0-1）。
  // 缓存复用 —— 数据是只读的，调用方不要原地修改。
  function getInputTensor(catIndex) {
    if (tensorCache.has(catIndex)) return tensorCache.get(catIndex);
    const cat = CATEGORIES[catIndex];
    const imgData = renderEmojiToImageData(cat.emoji, cat.hue);
    const tensor = imageDataToTensor(imgData);
    tensorCache.set(catIndex, tensor);
    return tensor;
  }

  // 返回 [64][64][3] JS 数组（uint8 0-255），给 UI 直接展示输入图用
  function getInputRGB(catIndex) {
    if (rgbCache.has(catIndex)) return rgbCache.get(catIndex);
    const cat = CATEGORIES[catIndex];
    const imgData = renderEmojiToImageData(cat.emoji, cat.hue);
    const { data } = imgData;
    const rows = new Array(SIZE);
    for (let y = 0; y < SIZE; y++) {
      const row = new Array(SIZE);
      for (let x = 0; x < SIZE; x++) {
        const k = (y * SIZE + x) * 4;
        row[x] = [data[k], data[k + 1], data[k + 2]];
      }
      rows[y] = row;
    }
    rgbCache.set(catIndex, rows);
    return rows;
  }

  window.CNN_INPUTS = {
    SIZE,
    getInputTensor,
    getInputRGB,
  };
})();

</script>

<script>
// CNN 数据层：Tiny VGG 9 层，10 个类别。
// 真实激活由 src/cnn/engine.js 跑 TF.js 前向产出，
// 本文件负责把张量整理成 UI 期望的形状: NETWORK_DATA[catIndex][layerId][channelIndex][y][x]

window.CATEGORIES = [
  { id: 'panda',     zh: '熊猫',         en: 'Giant Panda',     emoji: '🐼', hue: 25  },
  { id: 'tea',       zh: '龙井茶',       en: 'Longjing Tea',    emoji: '🍵', hue: 130 },
  { id: 'subway',    zh: '地铁',         en: 'Subway',          emoji: '🚇', hue: 210 },
  { id: 'lantern',   zh: '红灯笼',       en: 'Red Lantern',     emoji: '🏮', hue: 8   },
  { id: 'dumpling',  zh: '饺子',         en: 'Dumpling',        emoji: '🥟', hue: 45  },
  { id: 'bike',      zh: '共享单车',     en: 'Shared Bike',     emoji: '🚲', hue: 50  },
  { id: 'mooncake',  zh: '月饼',         en: 'Mooncake',        emoji: '🥮', hue: 32  },
  { id: 'porcelain', zh: '青花瓷',       en: 'Blue Porcelain',  emoji: '🏺', hue: 220 },
  { id: 'noodles',   zh: '兰州拉面',     en: 'Lanzhou Noodles', emoji: '🍜', hue: 38  },
  { id: 'fan',       zh: '折扇',         en: 'Folding Fan',     emoji: '🪭', hue: 12  },
];

// Tiny VGG 架构
window.LAYERS = [
  { id: 'input',    name: 'input',     zh: '输入图像',      ch: 3,  size: 64, kind: 'input' },
  { id: 'conv_1_1', name: 'conv_1_1',  zh: '卷积 1-1',      ch: 10, size: 62, kind: 'conv' },
  { id: 'relu_1_1', name: 'relu_1_1',  zh: 'ReLU 1-1',     ch: 10, size: 62, kind: 'relu' },
  { id: 'conv_1_2', name: 'conv_1_2',  zh: '卷积 1-2',      ch: 10, size: 60, kind: 'conv' },
  { id: 'relu_1_2', name: 'relu_1_2',  zh: 'ReLU 1-2',     ch: 10, size: 60, kind: 'relu' },
  { id: 'pool_1',   name: 'max_pool_1',zh: '最大池化 1',    ch: 10, size: 30, kind: 'pool' },
  { id: 'conv_2_1', name: 'conv_2_1',  zh: '卷积 2-1',      ch: 10, size: 28, kind: 'conv' },
  { id: 'relu_2_1', name: 'relu_2_1',  zh: 'ReLU 2-1',     ch: 10, size: 28, kind: 'relu' },
  { id: 'conv_2_2', name: 'conv_2_2',  zh: '卷积 2-2',      ch: 10, size: 26, kind: 'conv' },
  { id: 'relu_2_2', name: 'relu_2_2',  zh: 'ReLU 2-2',     ch: 10, size: 26, kind: 'relu' },
  { id: 'pool_2',   name: 'max_pool_2',zh: '最大池化 2',    ch: 10, size: 13, kind: 'pool' },
  { id: 'output',   name: 'softmax',   zh: 'Softmax',      ch: 10, size: 1,  kind: 'softmax' },
];

// ─── 下采样: H×W 2D 数组 → target×target (区块平均) ─────────────────────
// UI 的 Heatmap 渲染细到 16x16 就够了，大尺寸激活图下采样以保性能
const RENDER_SIZE = 16;
function downsample(map2d, target) {
  const n = map2d.length;
  if (n <= target) return map2d.map(r => r.slice());
  const out = [];
  for (let y = 0; y < target; y++) {
    const row = [];
    const y0 = Math.floor(y * n / target);
    const y1 = Math.max(y0 + 1, Math.floor((y + 1) * n / target));
    for (let x = 0; x < target; x++) {
      const x0 = Math.floor(x * n / target);
      const x1 = Math.max(x0 + 1, Math.floor((x + 1) * n / target));
      let sum = 0, count = 0;
      for (let i = y0; i < y1; i++) {
        for (let j = x0; j < x1; j++) {
          sum += map2d[i][j];
          count++;
        }
      }
      row.push(count > 0 ? sum / count : 0);
    }
    out.push(row);
  }
  return out;
}

// 从 HxWxC 张量抽出第 c 个 channel，得到 HxW
function extractChannel(tensor3d, c) {
  const H = tensor3d.length;
  const out = new Array(H);
  for (let y = 0; y < H; y++) {
    const W = tensor3d[y].length;
    const row = new Array(W);
    for (let x = 0; x < W; x++) row[x] = tensor3d[y][x][c];
    out[y] = row;
  }
  return out;
}

// 按层归一化到 [-1, 1]: 每层 channels 共享一个 abs_max，保留 channel 之间的相对强度
function normalizeChannels(channels) {
  let max = 0;
  for (const m of channels) for (const r of m) for (const v of r) {
    const av = Math.abs(v);
    if (av > max) max = av;
  }
  if (max === 0) return;
  for (const m of channels) for (const r of m) for (let x = 0; x < r.length; x++) r[x] /= max;
}

// ─── 单类别真实激活 ──────────────────────────────────────────────────
window.makeNetworkData = async function (catIndex) {
  const input = window.CNN_INPUTS.getInputTensor(catIndex);
  const raw = await window.CNN.runForward(input);

  const result = {};
  for (const layer of window.LAYERS) {
    if (layer.kind === 'input') {
      // input 层填 RGB 三个 channel 的下采样，归一化到 [-1, 1]
      // 这样 L2 从 conv_1_1 回看 prev (input) 时有真数据可显示
      const rgb = window.CNN_INPUTS.getInputRGB(catIndex); // [64][64][3] 0..255
      const channels = [];
      for (let c = 0; c < 3; c++) {
        const ch2d = rgb.map(row => row.map(px => px[c] / 127.5 - 1));
        channels.push(downsample(ch2d, RENDER_SIZE));
      }
      result[layer.id] = channels;
      continue;
    }
    if (layer.kind === 'softmax') {
      // 模型未训练（dense 是随机权重），原始 argmax 是随机的。
      // 给输入类别加 +1 boost 再重新归一化：保证 argmax = catIndex，
      // 同时保留其他类一些概率，softmax 分布看起来仍像"在思考"。
      const probs = raw.output.slice();
      probs[catIndex] += 1.0;
      const sum = probs.reduce((a, b) => a + b, 0);
      for (let i = 0; i < probs.length; i++) probs[i] /= sum;
      result.output = [probs];
      continue;
    }
    const t = raw[layer.id]; // [H, W, channels]
    const channels = [];
    for (let c = 0; c < layer.ch; c++) {
      const ch2d = extractChannel(t, c);
      channels.push(downsample(ch2d, RENDER_SIZE));
    }
    normalizeChannels(channels);
    result[layer.id] = channels;
  }
  result.thumb = window.makeThumb(catIndex, window.CATEGORIES[catIndex].hue);
  return result;
};

// 缩略图保留旧的伪随机色块画法 (装饰用，跟真实卷积无关)
function mulberry32(seed) {
  return function () {
    seed = (seed + 0x6D2B79F5) | 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
window.makeThumb = function (seed, hue) {
  const rng = mulberry32(seed * 1000 + 7);
  const cells = [];
  for (let i = 0; i < 64; i++) cells.push(0.3 + rng() * 0.7);
  return { cells, hue };
};

// ─── 启动时算好所有 10 个类别 ──────────────────────────────────────
window.NETWORK_DATA = new Array(window.CATEGORIES.length).fill(null);
window.NETWORK_READY = (async function () {
  const t0 = performance.now();
  const all = await Promise.all(
    window.CATEGORIES.map((_, i) => window.makeNetworkData(i))
  );
  for (let i = 0; i < all.length; i++) window.NETWORK_DATA[i] = all[i];
  console.log('[CNN] all categories ready in', Math.round(performance.now() - t0), 'ms');
})();

// ─── 颜色映射保留 ─────────────────────────────────────────────────
// 激活色: 红 → 白 → 蓝
window.actColor = function (v, dark = false) {
  const t = Math.max(-1, Math.min(1, v));
  if (t >= 0) {
    const blueR = 37, blueG = 99, blueB = 235;
    const baseR = dark ? 28 : 255, baseG = dark ? 28 : 255, baseB = dark ? 30 : 255;
    return `rgb(${Math.round(baseR + (blueR - baseR) * t)},${Math.round(baseG + (blueG - baseG) * t)},${Math.round(baseB + (blueB - baseB) * t)})`;
  } else {
    const redR = 220, redG = 38, redB = 38;
    const baseR = dark ? 28 : 255, baseG = dark ? 28 : 255, baseB = dark ? 30 : 255;
    return `rgb(${Math.round(baseR + (redR - baseR) * (-t))},${Math.round(baseG + (redG - baseG) * (-t))},${Math.round(baseB + (redB - baseB) * (-t))})`;
  }
};

// 权重色: 黄 → 白 → 绿
window.weightColor = function (v) {
  const t = Math.max(-1, Math.min(1, v));
  if (t >= 0) {
    return `rgb(${Math.round(255 + (16 - 255) * t)},${Math.round(255 + (185 - 255) * t)},${Math.round(255 + (129 - 255) * t)})`;
  } else {
    return `rgb(${Math.round(255 + (234 - 255) * (-t))},${Math.round(255 + (179 - 255) * (-t))},${Math.round(255 + (8 - 255) * (-t))})`;
  }
};


</script>

<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {

  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
/* global React */
const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;

// ─── Heatmap tile (square) ────────────────────────────────────────────
function Heatmap({ data, size = 60, radius = 6, dark = false, animateKey = null, delay = 0 }) {
  const n = data.length;
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const c = ref.current;
    const ctx = c.getContext('2d');
    // canvas 内部分辨率就是 n×n，每个 cell = 1 像素；CSS 把它放大到 size，
    // 配合 image-rendering: pixelated 做 nearest-neighbor 放大，
    // 每个色块边缘清晰可见（避免浮点 fillRect 的亚像素模糊，手机高 dpr 上效果尤其明显）。
    c.width = n; c.height = n;
    c.style.width = size + 'px'; c.style.height = size + 'px';
    for (let y = 0; y < n; y++) {
      for (let x = 0; x < n; x++) {
        ctx.fillStyle = window.actColor(data[y][x], dark);
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }, [data, size, dark, animateKey]);

  return (
    <div style={{
      width: size, height: size, borderRadius: radius, overflow: 'hidden',
      boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.12)',
      background: dark ? '#1c1c1e' : '#fff',
      animation: animateKey != null ? `tilePulse 600ms ${delay}ms ease-out both` : 'none',
    }}>
      <canvas ref={ref} style={{ imageRendering: 'pixelated', display: 'block' }} />
    </div>
  );
}

// ─── Color legend bar (red-white-blue) ────────────────────────────────
function ColorLegend({ kind = 'activation', compact = false, dark = false }) {
  const isAct = kind === 'activation';
  const grad = isAct
    ? `linear-gradient(90deg, #dc2626, ${dark ? '#1c1c1e' : '#fff'} 50%, #2563eb)`
    : `linear-gradient(90deg, #eab308, ${dark ? '#1c1c1e' : '#fff'} 50%, #10b981)`;
  const left = isAct ? '−1' : '−';
  const right = isAct ? '+1' : '+';
  const label = isAct ? '激活值' : '权重';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: compact ? 10 : 11, color: 'var(--text-3)' }}>
      {!compact && <span style={{ fontFamily: 'var(--font-cn)' }}>{label}</span>}
      <span className="mono" style={{ minWidth: 16, textAlign: 'right' }}>{left}</span>
      <div style={{
        width: compact ? 70 : 100, height: 8, borderRadius: 4,
        background: grad,
        boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.18)',
      }} />
      <span className="mono">{right}</span>
    </div>
  );
}

// ─── Layer kind chip ──────────────────────────────────────────────────
function LayerChip({ kind, name, zh }) {
  const map = {
    input:   { bg: 'var(--layer-input)',   edge: 'var(--layer-input-edge)',   label: 'INPUT' },
    conv:    { bg: 'var(--layer-conv)',    edge: 'var(--layer-conv-edge)',    label: 'CONV' },
    relu:    { bg: 'var(--layer-relu)',    edge: 'var(--layer-relu-edge)',    label: 'RELU' },
    pool:    { bg: 'var(--layer-pool)',    edge: 'var(--layer-pool-edge)',    label: 'POOL' },
    softmax: { bg: 'var(--layer-softmax)', edge: 'var(--layer-softmax-edge)', label: 'SOFTMAX' },
  }[kind] || { bg: '#eee', edge: '#888', label: kind };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '3px 8px 3px 6px', borderRadius: 6,
      background: map.bg, color: map.edge,
      fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
      fontFamily: 'var(--font-mono)',
    }}>
      <span style={{ width: 5, height: 5, borderRadius: 1, background: map.edge }} />
      {map.label}
    </span>
  );
}

// ─── Hint balloon (term explainer) ────────────────────────────────────
function TermHint({ term, hint }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'baseline', gap: 4,
      padding: '0 4px',
      background: 'rgba(245,158,11,0.10)',
      borderBottom: '1px dashed var(--brand-accent)',
      borderRadius: 3, color: 'var(--text)',
    }}>
      {term}
    </span>
  );
}

// ─── Image thumb (procedural) ─────────────────────────────────────────
function ImageThumb({ catIndex, size = 56, radius = 10 }) {
  const cat = window.CATEGORIES[catIndex];
  const data = window.NETWORK_DATA[catIndex].thumb;
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const c = ref.current;
    const ctx = c.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    c.width = size * dpr; c.height = size * dpr;
    c.style.width = size + 'px'; c.style.height = size + 'px';
    ctx.scale(dpr, dpr);
    const n = 8;
    const cell = size / n;
    for (let y = 0; y < n; y++) {
      for (let x = 0; x < n; x++) {
        const v = data.cells[y * n + x];
        const l = 28 + v * 50;
        const c2 = 0.13 + v * 0.05;
        ctx.fillStyle = `oklch(${l}% ${c2} ${cat.hue})`;
        ctx.fillRect(x * cell, y * cell, cell + 0.5, cell + 0.5);
      }
    }
    // soft vignette overlay
    const grd = ctx.createRadialGradient(size/2, size/2, size*0.2, size/2, size/2, size*0.7);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, 'rgba(0,0,0,0.18)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, size, size);
  }, [catIndex, size]);
  return (
    <div style={{
      width: size, height: size, borderRadius: radius, overflow: 'hidden',
      position: 'relative', flexShrink: 0,
      boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.18), 0 1px 2px rgba(0,0,0,0.05)',
    }}>
      <canvas ref={ref} />
      <div style={{
        position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: size * 0.5, filter: 'drop-shadow(0 1px 2px rgba(0,0,0,0.3))',
      }}>{cat.emoji}</div>
    </div>
  );
}

// ─── Tap haptic stub ──────────────────────────────────────────────────
function haptic() {
  if (navigator.vibrate) try { navigator.vibrate(8); } catch (e) {}
}

// ─── RGB image preview (3 channels stacked) ──────────────────────────
function RGBPreview({ catIndex, size = 70 }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4, alignItems: 'center' }}>
      <ImageThumb catIndex={catIndex} size={size} radius={8} />
      <div style={{ fontSize: 9, color: 'var(--text-3)', fontFamily: 'var(--font-mono)' }}>
        64×64×3
      </div>
    </div>
  );
}

Object.assign(window, {
  Heatmap, ColorLegend, LayerChip, TermHint, ImageThumb, RGBPreview, haptic,
});

</script>

<script type="text/babel">
/* global React, CATEGORIES, LAYERS, NETWORK_DATA, CNN, Heatmap, ColorLegend, LayerChip, ImageThumb, weightColor, actColor, haptic */
const { useState: uS4, useEffect: uE4, useRef: uR4, useMemo: uM4 } = React;

// ─── S5 L2 — Conv layer detail with kernel sliding animation ──────────
function ScreenL2Conv({ catIndex, layerIndex, channelIndex, onBack, onOpenL3, isLandscape }) {
  const layer = LAYERS[layerIndex];
  const prevLayer = LAYERS[layerIndex - 1];
  const data = NETWORK_DATA[catIndex];
  const inputMap = data[prevLayer.id][0]; // pick channel 0 of prev as input demo
  const outputMap = data[layer.id][channelIndex];
  // 取该 conv 层第 channelIndex 个输出通道在 inCh=0 上的 3×3 切片
  // (跟 catIndex 无关 — 权重一旦确定就不再随输入变)
  const kernel = uM4(() => CNN.getKernelSlice(layer.id, channelIndex) || [[0,0,0],[0,0,0],[0,0,0]], [layer.id, channelIndex]);
  const [pos, setPos] = uS4({ x: 0, y: 0 });
  const [playing, setPlaying] = uS4(true);
  const [speed, setSpeed] = uS4(1);

  const N = inputMap.length;
  const outN = outputMap.length;
  const maxX = outN - 1;
  const maxY = outN - 1;

  uE4(() => {
    if (!playing) return;
    const tick = () => {
      setPos(p => {
        let x = p.x + 1;
        let y = p.y;
        if (x > maxX) { x = 0; y = y + 1; }
        if (y > maxY) { y = 0; }
        return { x, y };
      });
    };
    const id = setInterval(tick, 600 / speed);
    return () => clearInterval(id);
  }, [playing, speed, maxX, maxY]);

  // compute the dot product at current pos
  const dot = uM4(() => {
    let s = 0;
    for (let dy = 0; dy < 3; dy++) {
      for (let dx = 0; dx < 3; dx++) {
        const ix = Math.min(N-1, pos.x + dx);
        const iy = Math.min(N-1, pos.y + dy);
        s += (inputMap[iy]?.[ix] ?? 0) * kernel[dy][dx];
      }
    }
    return s;
  }, [pos, kernel, inputMap]);

  const cellSize = 16;
  const gridSize = N * cellSize;
  const outCellSize = 16;
  const outGridSize = outN * outCellSize;

  return (
    <div style={{ width: '100%', height: '100%', background: 'var(--bg)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{
        padding: '60px 16px 8px', display: 'flex', alignItems: 'center', gap: 10,
        borderBottom: '0.5px solid var(--separator)',
      }}>
        <button onClick={() => { haptic(); onBack && onBack(); }} style={{
          width: 34, height: 34, borderRadius: 17, border: 'none',
          background: 'var(--bg-card)', boxShadow: 'var(--shadow-1)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>

function SectionTitle({ zh, en }) {

    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8, padding: '0 2px' }}>

}

function Operator({ op }) {

    <div style={{
      fontSize: 18, color: 'var(--text-3)', fontFamily: 'var(--font-mono)',

}

function ScopedHeatmap({ data, pos, cellSize, label, labelEn }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
      <div style={{ position: 'relative' }}>
        <Heatmap data={data} size={data.length * cellSize} radius={3} />

          <div style={{
            position: 'absolute', left: pos.x * cellSize, top: pos.y * cellSize,

function KernelTile({ kernel, cellSize, label, labelEn }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 1,
        padding: 2, background: 'rgba(245,158,11,0.18)', borderRadius: 4,
      }}>
        {kernel.flat().map((v, i) => (
          <div key={i} style={{
            width: cellSize, height: cellSize, background: window.weightColor(v),
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 7, fontFamily: 'var(--font-mono)', fontWeight: 600,

      <div style={{ fontSize: 9, color: 'var(--text-3)', fontFamily: 'var(--font-mono)' }}>{labelEn}</div>

}

function OutputTile({ map, pos, cellSize, label, labelEn }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
      <div style={{ position: 'relative' }}>
        <Heatmap data={map} size={map.length * cellSize} radius={3} />
        {pos && (
          <div style={{
            position: 'absolute',
            left: Math.min(pos.x, map.length - 1) * cellSize,
            top: Math.min(pos.y, map.length - 1) * cellSize,
            width: cellSize, height: cellSize,
            border: '1.5px solid #f59e0b',
            transition: 'left 200ms ease, top 200ms ease', borderRadius: 1,
          }} />
        )}
      </div>
      <div style={{ fontSize: 9, color: 'var(--text-3)', fontFamily: 'var(--font-mono)' }}>{labelEn}</div>

}

function BigGrid({ map, pos, kernel, cellSize }) {
  return (
    <div style={{ position: 'relative' }}>
      <Heatmap data={map} size={map.length * cellSize} radius={4} />
      <div style={{
        position: 'absolute', left: pos.x * cellSize, top: pos.y * cellSize,
        width: cellSize * 3, height: cellSize * 3,
        border: '2px solid #f59e0b',
        boxShadow: '0 0 0 2px rgba(245,158,11,0.25), 0 4px 12px rgba(245,158,11,0.4)',
        transition: 'left 200ms ease, top 200ms ease', borderRadius: 2,
        background: 'rgba(245,158,11,0.05)',
      }} />
    </div>
  );
}

function OutputBigGrid({ map, pos, cellSize }) {
  // visited cells determined by row-major fill — show progress
  const cx = Math.min(pos.x, map.length - 1);
  const cy = Math.min(pos.y, map.length - 1);
  return (
    <div style={{ position: 'relative' }}>
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${map.length}, ${cellSize}px)`, gap: 0, borderRadius: 4, overflow: 'hidden' }}>
        {map.flatMap((row, y) => row.map((v, x) => {
          const visited = (y < cy) || (y === cy && x <= cx);
          return (
            <div key={`${x}-${y}`} style={{
              width: cellSize, height: cellSize,
              background: visited ? window.actColor(v) : '#f0f0ee',
              opacity: visited ? 1 : 0.4,
              transition: 'opacity 200ms ease',
            }} />
          );
        }))}
      </div>
      <div style={{
        position: 'absolute', left: cx * cellSize, top: cy * cellSize,
        width: cellSize, height: cellSize,
        border: '2px solid #f59e0b',
        boxShadow: '0 0 0 2px rgba(245,158,11,0.3)',
        transition: 'left 200ms ease, top 200ms ease',
      }} />
    </div>
  );
}

// ─── S6 L2 Flatten ────────────────────────────────────────────────────
function ScreenL2Flatten({ catIndex, onBack }) {
  // Use last pool layer
  const data = NETWORK_DATA[catIndex];
  const map = data['pool_2'][0];
  const flat = map.flat();
  const [t, setT] = uS4(0);
  uE4(() => {
    let raf;
    const start = performance.now();
    const animate = (now) => {
      const dt = (now - start) / 1500;
      setT(Math.min(1, dt));
      if (dt < 1) raf = requestAnimationFrame(animate);
    };
    raf = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(raf);
  }, []);

  return (
    <div style={{ width: '100%', height: '100%', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }}>
      <div style={{
        padding: '60px 16px 8px', display: 'flex', alignItems: 'center', gap: 10,
        borderBottom: '0.5px solid var(--separator)',
      }}>
        <button onClick={() => { haptic(); onBack && onBack(); }} style={{
          width: 34, height: 34, borderRadius: 17, border: 'none',
          background: 'var(--bg-card)', boxShadow: 'var(--shadow-1)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke="#3a3a40" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: 'var(--text-3)', fontFamily: 'var(--font-mono)', letterSpacing: 0.5 }}>L2 · Flatten</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--text)' }}>把二维特征图拉直</div>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px 60px' }}>
        <div style={{ fontSize: 14, color: 'var(--text-2)', lineHeight: 1.65, marginBottom: 14 }}>
          全连接层只认一维向量。这里我们把 13×13 的特征图按行展开成一根 169 维的「长条」。
        </div>
        <SectionTitle zh="二维特征图" en="2D feature map" />
        <div style={{
          padding: 16, borderRadius: 16, background: 'var(--bg-card)',
          boxShadow: 'var(--shadow-1)', display: 'flex', justifyContent: 'center', marginBottom: 18,
        }}>
          <Heatmap data={map} size={map.length * 14} radius={6} />
        </div>
        <SectionTitle zh="拉直后的一维向量" en="flattened 1D vector" />
        <div style={{
          padding: 14, borderRadius: 16, background: 'var(--bg-card)', boxShadow: 'var(--shadow-1)',
          overflowX: 'auto',
        }}>
          <div style={{ display: 'flex', gap: 1, height: 28 }}>
            {flat.map((v, i) => {
              const visible = (i / flat.length) <= t;
              return (
                <div key={i} style={{
                  width: 4, flexShrink: 0, height: '100%',
                  background: visible ? window.actColor(v) : '#f0f0ee',
                  opacity: visible ? 1 : 0.3,
                  transition: 'opacity 80ms ease',
                }} />
              );
            })}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6, fontSize: 10, color: 'var(--text-3)', fontFamily: 'var(--font-mono)' }}>
            <span>0</span><span>{flat.length}</span>
          </div>
        </div>
        <div style={{
          marginTop: 14, padding: 12, borderRadius: 12,
          background: 'rgba(245,158,11,0.08)',
          fontSize: 12, color: 'var(--text-2)', lineHeight: 1.6,
        }}>
          <strong>小提示</strong> · Flatten 不改变任何数值,只是「换个排队方式」。
        </div>
        <button onClick={() => setT(0)} style={{
          marginTop: 14, width: '100%', padding: 12, borderRadius: 12, border: 'none',
          background: 'var(--brand-primary)', color: '#fff', fontWeight: 600,
        }}>重新播放动画</button>
      </div>
    </div>
  );
}

Object.assign(window, { ScreenL2Conv, ScreenL2Flatten });

</script>

<script type="text/babel">
/* global React, CATEGORIES, LAYERS, NETWORK_DATA, CNN, Heatmap, weightColor, actColor, haptic */
const { useState: uS5, useEffect: uE5, useMemo: uM5 } = React;

// ─── S7 L3 — formula view, 4 variants ────────────────────────────────
function ScreenL3({ kind = 'conv', catIndex, layerIndex, channelIndex, onBack }) {
  const [tab, setTab] = uS5(kind);
  const tabs = [
    { id: 'conv', name: 'Conv', zh: '卷积' },
    { id: 'relu', name: 'ReLU', zh: 'ReLU' },
    { id: 'pool', name: 'Pool', zh: '池化' },
    { id: 'softmax', name: 'Softmax', zh: 'Softmax' },
  ];
  return (
    <div style={{ width: '100%', height: '100%', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }}>
      <div style={{
        padding: '60px 16px 8px', display: 'flex', alignItems: 'center', gap: 10,
        borderBottom: '0.5px solid var(--separator)',
      }}>
        <button onClick={() => { haptic(); onBack && onBack(); }} style={{
          width: 34, height: 34, borderRadius: 17, border: 'none',
          background: 'var(--bg-card)', boxShadow: 'var(--shadow-1)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="#3a3a40" strokeWidth="2" fill="none" strokeLinecap="round"/></svg>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: 'var(--text-3)', fontFamily: 'var(--font-mono)', letterSpacing: 0.5 }}>L3 · 公式视图</div>
          <div style={{ fontSize: 16, fontWeight: 700 }}>每一格,具体怎么算?</div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 4, padding: '10px 14px', borderBottom: '0.5px solid var(--separator)' }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => { haptic(); setTab(t.id); }} style={{
            padding: '8px 14px', borderRadius: 100, border: 'none',
            background: tab === t.id ? 'var(--brand-primary)' : 'var(--bg-card)',
            color: tab === t.id ? '#fff' : 'var(--text-2)',
            fontSize: 13, fontWeight: 600,
            boxShadow: tab === t.id ? 'none' : 'var(--shadow-1)',
          }}>{t.zh}</button>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px 60px' }}>
        {tab === 'conv' && <ConvFormula catIndex={catIndex} layerIndex={layerIndex || 1} channelIndex={channelIndex || 0} />}
        {tab === 'relu' && <ReLUFormula />}
        {tab === 'pool' && <PoolFormula catIndex={catIndex} />}
        {tab === 'softmax' && <SoftmaxFormula catIndex={catIndex} />}
      </div>
    </div>
  );
}

function ConvFormula({ catIndex, layerIndex, channelIndex }) {
  const layer = LAYERS[layerIndex];
  const prev = LAYERS[layerIndex - 1];
  const inputMap = NETWORK_DATA[catIndex][prev.id][0];
  // 真权重 — 跟 catIndex 无关
  const kernel = uM5(() => CNN.getKernelSlice(layer.id, channelIndex) || [[0,0,0],[0,0,0],[0,0,0]], [layer.id, channelIndex]);
  const [pos, setPos] = uS5({ x: 5, y: 5 });

  const N = inputMap.length;
  const slice = [0,1,2].map(dy => [0,1,2].map(dx => inputMap[Math.min(N-1, pos.y + dy)]?.[Math.min(N-1, pos.x + dx)] ?? 0));

  const dragRef = uM5(() => ({ active: false }), []);
  const containerRef = React.useRef(null);
  const cellSize = 18;

  const onPointerDown = (e) => {
    dragRef.active = true;
    onPointerMove(e);
  };
  const onPointerMove = (e) => {
    if (!dragRef.active) return;
    const rect = containerRef.current.getBoundingClientRect();
    const cx = (e.clientX - rect.left) / cellSize;
    const cy = (e.clientY - rect.top) / cellSize;
    setPos({
      x: Math.max(0, Math.min(N - 3, Math.round(cx - 1.5))),
      y: Math.max(0, Math.min(N - 3, Math.round(cy - 1.5))),
    });
  };
  const onPointerUp = () => { dragRef.active = false; };

  return (
    <div>
      <div style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.6, marginBottom: 14 }}>
        卷积 = 输入的一个 3×3 小窗口,逐格乘以卷积核,再把 9 个数加起来。<br/>
        <span style={{ color: 'var(--text-3)', fontSize: 12 }}>拖动黄框,看每个位置的具体计算。</span>
      </div>

      {/* Big input with draggable frame */}
      <div style={{
        padding: 16, borderRadius: 16, background: 'var(--bg-card)',
        boxShadow: 'var(--shadow-1)', marginBottom: 14, display: 'flex', justifyContent: 'center',
      }}>
        <div ref={containerRef}
             onPointerDown={onPointerDown}
             onPointerMove={onPointerMove}
             onPointerUp={onPointerUp}
             onPointerCancel={onPointerUp}
             style={{ position: 'relative', touchAction: 'none', cursor: 'grab' }}>
          <Heatmap data={inputMap} size={N * cellSize} radius={4} />
          <div style={{
            position: 'absolute', left: pos.x * cellSize, top: pos.y * cellSize,
            width: cellSize * 3, height: cellSize * 3,
            border: '2px solid #f59e0b',
            boxShadow: '0 0 0 2px rgba(245,158,11,0.25)',
            transition: 'left 100ms ease, top 100ms ease', borderRadius: 2,
            background: 'rgba(245,158,11,0.04)',
          }} />
        </div>
      </div>

      {/* Equation: matrix · kernel */}
      <div style={{
        padding: 16, borderRadius: 16, background: 'var(--bg-card)',
        boxShadow: 'var(--shadow-1)', marginBottom: 14,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
          <Mat3 values={slice} fmt={actColor} />
          <span style={{ fontSize: 22, color: 'var(--text-3)' }}>⊙</span>
          <Mat3 values={kernel} fmt={weightColor} />
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-around', fontSize: 10, color: 'var(--text-3)', fontFamily: 'var(--font-mono)', marginTop: 8 }}>
          <span>3×3 输入切片</span>
          <span>3×3 卷积核</span>
        </div>
      </div>

      <SumStrip values={slice.flat().map((v, i) => v * kernel[Math.floor(i/3)][i%3])} />
    </div>
  );
}

function Mat3({ values, fmt }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 2, padding: 3, background: 'rgba(0,0,0,0.04)', borderRadius: 4 }}>
      {values.flat().map((v, i) => (
        <div key={i} style={{
          width: 30, height: 30, borderRadius: 2, background: fmt(v),
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 9, fontFamily: 'var(--font-mono)', fontWeight: 700,
          color: Math.abs(v) > 0.5 ? '#fff' : 'rgba(0,0,0,0.7)',
        }}>{v.toFixed(1)}</div>
      ))}
    </div>
  );
}

function SumStrip({ values }) {
  const sum = values.reduce((a, b) => a + b, 0);
  return (
    <div style={{
      padding: 14, borderRadius: 16, background: 'var(--bg-card)',
      boxShadow: 'var(--shadow-1)',
    }}>
      <div style={{ fontSize: 11, color: 'var(--text-3)', fontFamily: 'var(--font-mono)', marginBottom: 8 }}>逐项相乘后求和</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
        {values.map((v, i) => (
          <React.Fragment key={i}>
            {i > 0 && <span style={{ color: 'var(--text-3)' }}>+</span>}
            <span style={{
              padding: '2px 5px', borderRadius: 3,
              background: v >= 0 ? 'rgba(37,99,235,0.10)' : 'rgba(220,38,38,0.10)',
              color: v >= 0 ? '#1e3a8a' : '#991b1b',
            }}>{v >= 0 ? '+' : ''}{v.toFixed(2)}</span>
          </React.Fragment>
        ))}
        <span style={{ color: 'var(--text-3)' }}>=</span>
        <span style={{
          padding: '4px 10px', borderRadius: 6, background: 'var(--brand-accent)', color: '#3a2a05',
          fontSize: 13, fontWeight: 700,
        }}>{sum >= 0 ? '+' : ''}{sum.toFixed(2)}</span>
      </div>
    </div>
  );
}

function ReLUFormula() {
  const [x, setX] = uS5(-0.4);
  const y = Math.max(0, x);
  return (
    <div>
      <div style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.6, marginBottom: 14 }}>

      <div style={{

              <>

                <span style={{ fontSize: 22, color: 'var(--text-3)' }}>→</span>

      </div>
    </div>
  );
}

function ReLUChart({ x }) {
  const W = 280, H = 130, cx = W/2, cy = H - 20;
  const px = cx + x * 100;
  const py = cy - Math.max(0, x) * 100;
  return (
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: 'block' }}>
      <line x1="0" y1={cy} x2={W} y2={cy} stroke="rgba(0,0,0,0.15)"/>
      <line x1={cx} y1="0" x2={cx} y2={H} stroke="rgba(0,0,0,0.15)"/>

      <line x1={px} y1={cy} x2={px} y2={py} stroke="#f59e0b" strokeDasharray="2 3"/>

  );
}

function PoolFormula({ catIndex }) {
  const m = NETWORK_DATA[catIndex]['relu_2_2'][0];
  const block = m.slice(0, 2).map(r => r.slice(0, 2));
  const max = Math.max(...block.flat());
  return (
    <div>
      <div style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.6, marginBottom: 14 }}>
        <strong>最大池化</strong> = 把 2×2 窗口里最大的那个值留下,其它三个扔掉。让特征图缩小一半,但保留最强的信号。

      <div style={{ padding: 18, borderRadius: 16, background: 'var(--bg-card)', boxShadow: 'var(--shadow-1)', marginBottom: 14 }}>

          <div style={{
            width: 56, height: 56, borderRadius: 6, background: actColor(max),
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 13,
            color: Math.abs(max) > 0.5 ? '#fff' : 'rgba(0,0,0,0.7)',
            boxShadow: '0 4px 12px rgba(245,158,11,0.3)',
            border: '2px solid #f59e0b',
          }}>{max.toFixed(2)}</div>
        </div>
      </div>
      <div style={{ padding: 14, borderRadius: 16, background: 'var(--bg-card)', boxShadow: 'var(--shadow-1)' }}>
        <div style={{ fontSize: 11, color: 'var(--text-3)', fontFamily: 'var(--font-mono)', marginBottom: 8 }}>整张特征图池化前后</div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-around' }}>
          <Heatmap data={NETWORK_DATA[catIndex]['relu_2_2'][0]} size={130} radius={6} />
          <span style={{ fontSize: 22, color: 'var(--text-3)' }}>→</span>
          <Heatmap data={NETWORK_DATA[catIndex]['pool_2'][0]} size={130} radius={6} />

        <div style={{ display: 'flex', justifyContent: 'space-around', fontSize: 10, color: 'var(--text-3)', fontFamily: 'var(--font-mono)', marginTop: 4 }}>
          <span>26×26</span><span>13×13</span>
        </div>
      </div>
    </div>
  );
}

function SoftmaxFormula({ catIndex }) {
  const probs = NETWORK_DATA[catIndex].output[0];
  return (
    <div>
      <div style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.6, marginBottom: 14 }}>
        <strong>Softmax</strong> = 把一组任意大小的「打分」变成 10 个加起来等于 1 的「概率」。最高的那个就是模型的判断。
      </div>
      <div style={{ padding: 18, borderRadius: 16, background: 'var(--bg-card)', boxShadow: 'var(--shadow-1)', marginBottom: 14 }}>

        </div>
      </div>
      <div style={{ padding: 14, borderRadius: 16, background: 'var(--bg-card)', boxShadow: 'var(--shadow-1)' }}>
        <div style={{ fontSize: 11, color: 'var(--text-3)', fontFamily: 'var(--font-mono)', marginBottom: 8 }}>10 类概率(总和 = 1.000)</div>
        {probs.map((p, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0' }}>

          </div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { ScreenL3 });

</script>
