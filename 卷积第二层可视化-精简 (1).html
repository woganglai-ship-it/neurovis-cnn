document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n  <canvas data-key=\"mp-2\" width=\"30\" height=\"30\" style=\"position:absolute;left:304px;top:396px;width:108px;height:108px;border:2px solid #b3b3b3;background:#faf8f5\"><\u002Fcanvas>\n  <!-- sliding kernel overlays (input) -->\n  <div data-key=\"ker-0\" style=\"position:absolute;left:304px;top:96px;width:11px;height:11px;border:1.5px solid rgba(50,50,50,0.9);background:rgba(110,150,205,0.22);box-sizing:border-box;pointer-events:none;will-change:transform\"><\u002Fdiv>\n  <div data-key=\"ker-1\" style=\"position:absolute;left:304px;top:232px;width:11px;height:11px;border:1.5px solid rgba(50,50,50,0.9);background:rgba(110,150,205,0.22);box-sizing:border-box;pointer-events:none;will-change:transform\"><\u002Fdiv>\n  <div data-key=\"ker-2\" style=\"position:absolute;left:304px;top:396px;width:11px;height:11px;border:1.5px solid rgba(50,50,50,0.9);background:rgba(110,150,205,0.22);box-sizing:border-box;pointer-events:none;will-change:transform\"><\u002Fdiv>\n\n  <!-- intermediate squares -->\n  <canvas data-key=\"int-0\" width=\"30\" height=\"30\" style=\"position:absolute;left:592px;top:96px;width:108px;height:108px;border:2px solid #b3b3b3;background:#faf8f5\"><\u002Fcanvas>\n  <canvas data-key=\"int-1\" width=\"30\" height=\"30\" style=\"position:absolute;left:592px;top:232px;width:108px;height:108px;border:2px solid #b3b3b3;background:#faf8f5\"><\u002Fcanvas>\n  <canvas data-key=\"int-2\" width=\"30\" height=\"30\" style=\"position:absolute;left:592px;top:396px;width:108px;height:108px;border:2px solid #b3b3b3;background:#faf8f5\"><\u002Fcanvas>\n  <!-- output write cursor (intermediate) -->\n  <div data-key=\"cur-0\" style=\"position:absolute;left:592px;top:96px;width:4.6px;height:4.6px;border:1.4px solid rgba(50,50,50,0.85);box-sizing:border-box;pointer-events:none;will-change:transform\"><\u002Fdiv>\n  <div data-key=\"cur-1\" style=\"position:absolute;left:592px;top:232px;width:4.6px;height:4.6px;border:1.4px solid rgba(50,50,50,0.85);box-sizing:border-box;pointer-events:none;will-change:transform\"><\u002Fdiv>\n  <div data-key=\"cur-2\" style=\"position:absolute;left:592px;top:396px;width:4.6px;height:4.6px;border:1.4px solid rgba(50,50,50,0.85);box-sizing:border-box;pointer-events:none;will-change:transform\"><\u002Fdiv>\n\n  <!-- omitted-channel ellipsis -->\n  <div style=\"position:absolute;left:280px;top:352px;font-size:30px;line-height:0.5;letter-spacing:2px;color:#c4c4c4;font-weight:700\">⋮<\u002Fdiv>\n  <div style=\"position:absolute;left:360px;top:352px;font-size:30px;line-height:0.5;color:#c4c4c4;font-weight:700\">⋮<\u002Fdiv>\n  <div style=\"position:absolute;left:648px;top:352px;font-size:30px;line-height:0.5;color:#c4c4c4;font-weight:700\">⋮<\u002Fdiv>\n\n  <!-- conv_2_1 selected output -->\n  <canvas data-key=\"c2-0\" width=\"30\" height=\"30\" style=\"position:absolute;left:1084px;top:244px;width:112px;height:112px;border:3px solid #585858;background:#faf8f5\"><\u002Fcanvas>\n\n  <!-- summation + bias -->\n  <div style=\"position:absolute;left:872px;top:282px;width:36px;height:36px;border:1.5px solid #8a8a8a;border-radius:2px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;color:#666;line-height:1\">+<\u002Fdiv>\n  <div style=\"position:absolute;left:881px;top:332px;width:18px;height:18px;border-radius:50%;background:#34b3a0\"><\u002Fdiv>\n  <div style=\"position:absolute;left:855px;top:354px;width:70px;text-align:center;font-size:15px;font-style:italic;font-family:Georgia,serif;color:#8a8a8a\">Bias<\u002Fdiv>\n\n  <!-- annotations -->\n  <div style=\"position:absolute;left:40px;top:96px;width:222px;text-align:right;font-family:Georgia,serif;font-style:italic;font-size:15.5px;line-height:1.4;color:#8a8a8a\">\n    <div style=\"font-style:normal;color:#6a6a6a;font-size:14px;margin-bottom:3px\">Kernel <span style=\"display:inline-block;width:14px;height:12px;vertical-align:middle;background:linear-gradient(90deg,#bcd4ec 50%,#f0f0f0 50%);border:1px solid #c8c8c8\"><\u002Fspan><\u002Fdiv>\n    Slide kernel over input<br>channel to get<br>intermediate result<br><b style=\"color:#555\">Click<\u002Fb> to learn more\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:30px;top:248px;width:232px;text-align:right;font-family:Georgia,serif;font-style:italic;font-size:15.5px;line-height:1.4;color:#8a8a8a\">\n    Each input channel<br>gets a different kernel<br><b style=\"color:#555\">Hover over<\u002Fb> to see value!\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:948px;top:200px;width:170px;text-align:left;font-family:Georgia,serif;font-style:italic;font-size:15.5px;line-height:1.4;color:#8a8a8a\">\n    Add up all intermediate<br>results and then add bias\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const n = 30; this.n = n;\n    const A = document.createElement('canvas'); A.width = n; A.height = n;\n    this.drawCupShade(A.getContext('2d'), n);\n    const B = document.createElement('canvas'); B.width = n; B.height = n;\n    this.drawCupMask(B.getContext('2d'), n);\n    this.lum = this.luma(A.getContext('2d'), n);\n    this.mask = this.alpha(B.getContext('2d'), n);\n\n    const q = (k) => this.root.querySelector('[data-key=\"' + k + '\"]');\n\n    // static inputs + conv output\n    this.drawCell(q('mp-0'), 0.40, 1, 1001);\n    this.drawCell(q('mp-1'), 0.26, 1, 1208);\n    this.drawCell(q('mp-2'), 0.55, 1, 1455);\n    this.drawCell(q('c2-0'), 0.78, 1, 3003);\n\n    // intermediate channels: precompute full pixels, animate reveal\n    this.bg = [250, 248, 245];\n    this.intCfg = [\n      { canvas: q('int-0'), data: this.computeCellData(0.40,  1, 2002) },\n      { canvas: q('int-1'), data: this.computeCellData(0.42, -1, 2309) },\n      { canvas: q('int-2'), data: this.computeCellData(0.50,  1, 2606) },\n    ];\n    this.kernels = [q('ker-0'), q('ker-1'), q('ker-2')];\n    this.cursors = [q('cur-0'), q('cur-1'), q('cur-2')];\n\n    // animation params\n    this.K = 3;                 // kernel size in cells\n    this.OUT = n - this.K + 1;  // 28 valid output positions per axis\n    this.cellPx = 108 / n;      // px per cell on screen\n    this.scan = 0;              // 0 .. OUT*OUT\n    this.holdFrames = 0;\n    this.startAnim();\n\n    this.fit = () => {\n      const s = Math.min(window.innerWidth * 0.85 / 1300, window.innerHeight * 0.88 / 540, 1);\n      this.root.style.transform = 'scale(' + s + ')';\n    };\n    this.fit();\n    window.addEventListener('resize', this.fit);\n  }\n\n  componentWillUnmount() {\n    if (this.fit) window.removeEventListener('resize', this.fit);\n    if (this.timer) clearInterval(this.timer);\n  }\n\n  startAnim() {\n    const total = this.OUT * this.OUT;\n    this.renderScan();\n    this.timer = setInterval(() => {\n      this.renderScan();\n      if (this.holdFrames > 0) {\n        this.holdFrames--;\n      } else {\n        this.scan += 1.5;               // ~1.5 output cells per tick (half speed)\n        if (this.scan >= total) {       // finished a full sweep\n          this.scan = total;\n          this.holdFrames = 45;         // pause on the completed map (~1.5s)\n          this.renderScan();\n          this.scan = 0;                // restart after the hold\n        }\n      }\n    }, 33);\n  }\n\n  renderScan() {\n    const n = this.n, OUT = this.OUT, K = this.K, cp = this.cellPx;\n    const done = Math.min(this.scan, OUT * OUT);\n    // current output cell (row-major)\n    const oi = Math.min(done, OUT * OUT - 1);\n    const ox = oi % OUT, oy = (oi / OUT) | 0;\n\n    // move kernel + cursor overlays\n    for (let i = 0; i < this.kernels.length; i++) {\n      if (this.kernels[i]) this.kernels[i].style.transform =\n        'translate(' + (ox * cp) + 'px,' + (oy * cp) + 'px)';\n      if (this.cursors[i]) this.cursors[i].style.transform =\n        'translate(' + ((ox + (K - 1) / 2) * cp) + 'px,' + ((oy + (K - 1) / 2) * cp) + 'px)';\n    }\n\n    // reveal intermediate pixels up to the scan cursor\n    for (const cfg of this.intCfg) {\n      if (!cfg.canvas) continue;\n      const ctx = cfg.canvas.getContext('2d');\n      const img = ctx.createImageData(n, n);\n      const full = cfg.data, bg = this.bg;\n      for (let y = 0; y < n; y++) {\n        for (let x = 0; x < n; x++) {\n          const p = (y * n + x) * 4;\n          // an output cell (ox2,oy2) is \"written\" once scan passes it\n          const inField = x < OUT && y < OUT;\n          const revealed = inField && (oy * OUT + ox) >= (y * OUT + x);\n          if (revealed) {\n            img.data[p] = full[p]; img.data[p+1] = full[p+1];\n            img.data[p+2] = full[p+2]; img.data[p+3] = 255;\n          } else {\n            img.data[p] = bg[0]; img.data[p+1] = bg[1];\n            img.data[p+2] = bg[2]; img.data[p+3] = 255;\n          }\n        }\n      }\n      ctx.putImageData(img, 0, 0);\n    }\n  }\n\n  computeCellData(intensity, sign, seed) {\n    const n = this.n;\n    const data = new Uint8ClampedArray(n * n * 4);\n    const rnd = this.mulberry32(seed);\n    for (let i = 0; i < n * n; i++) {\n      let v;\n      if (this.mask[i] > 0.4) {\n        const l = this.lum[i];\n        v = sign * intensity * (0.55 + 0.45 * (1 - l)) + (rnd() - 0.5) * 0.05 * intensity;\n      } else {\n        v = (rnd() - 0.5) * 0.012;\n      }\n      const [r, g, b] = this.color(v);\n      data[i*4] = r; data[i*4+1] = g; data[i*4+2] = b; data[i*4+3] = 255;\n    }\n    return data;\n  }\n\n  drawCell(canvas, intensity, sign, seed) {\n    if (!canvas) return;\n    const n = this.n, ctx = canvas.getContext('2d');\n    const img = ctx.createImageData(n, n);\n    const rnd = this.mulberry32(seed);\n    for (let i = 0; i < n * n; i++) {\n      let v;\n      if (this.mask[i] > 0.4) {\n        const l = this.lum[i];\n        v = sign * intensity * (0.55 + 0.45 * (1 - l)) + (rnd() - 0.5) * 0.05 * intensity;\n      } else {\n        v = (rnd() - 0.5) * 0.012;\n      }\n      const [r, g, b] = this.color(v);\n      img.data[i*4] = r; img.data[i*4+1] = g; img.data[i*4+2] = b; img.data[i*4+3] = 255;\n    }\n    ctx.putImageData(img, 0, 0);\n  }\n\n  color(v) {\n    const r0 = 250, g0 = 248, b0 = 245;\n    if (v < 0) {\n      const t = Math.min(1, -v / 0.7);\n      return [Math.round(r0 + (233 - r0) * t), Math.round(g0 + (150 - g0) * t), Math.round(b0 + (118 - b0) * t)];\n    } else if (v > 0) {\n      const t = Math.min(1, v / 0.72);\n      return [Math.round(r0 + (95 - r0) * t), Math.round(g0 + (150 - g0) * t), Math.round(b0 + (205 - b0) * t)];\n    }\n    return [r0, g0, b0];\n  }\n\n  luma(ctx, n) {\n    const d = ctx.getImageData(0, 0, n, n).data;\n    const out = new Float32Array(n * n);\n    for (let i = 0; i < n * n; i++) out[i] = (0.299 * d[i*4] + 0.587 * d[i*4+1] + 0.114 * d[i*4+2]) / 255;\n    return out;\n  }\n  alpha(ctx, n) {\n    const d = ctx.getImageData(0, 0, n, n).data;\n    const out = new Float32Array(n * n);\n    for (let i = 0; i < n * n; i++) out[i] = d[i*4+3] / 255;\n    return out;\n  }\n  mulberry32(a) {\n    return function () {\n      a |= 0; a = a + 0x6D2B79F5 | 0;\n      let t = Math.imul(a ^ a >>> 15, 1 | a);\n      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;\n      return ((t ^ t >>> 14) >>> 0) / 4294967296;\n    };\n  }\n\n  renderVals() {\n    return { rootRef: (el) => { this.root = el; } };\n  }\n\n  drawCupMask(ctx, s) {\n    ctx.clearRect(0, 0, s, s);\n    ctx.fillStyle = '#000';\n    const cx = 0.45 * s;\n    ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; ctx.lineWidth = 0.10 * s;\n    ctx.beginPath(); ctx.arc(0.70 * s, 0.575 * s, 0.115 * s, -1.05, 1.05); ctx.stroke();\n    ctx.beginPath();\n    ctx.moveTo(cx - 0.24 * s, 0.40 * s);\n    ctx.lineTo(cx - 0.205 * s, 0.74 * s);\n    ctx.quadraticCurveTo(cx, 0.84 * s, cx + 0.205 * s, 0.74 * s);\n    ctx.lineTo(cx + 0.24 * s, 0.40 * s);\n    ctx.closePath(); ctx.fill();\n    ctx.beginPath(); ctx.ellipse(cx, 0.40 * s, 0.24 * s, 0.062 * s, 0, 0, Math.PI * 2); ctx.fill();\n  }\n\n  drawCupShade(ctx, s) {\n    ctx.clearRect(0, 0, s, s);\n    ctx.fillStyle = '#202020'; ctx.fillRect(0, 0, s, s);\n    const cx = 0.45 * s;\n    ctx.strokeStyle = '#f2f2f2'; ctx.lineWidth = 0.052 * s; ctx.lineCap = 'round';\n    ctx.beginPath(); ctx.arc(0.70 * s, 0.575 * s, 0.115 * s, -1.05, 1.05); ctx.stroke();\n    const g = ctx.createLinearGradient(cx - 0.25 * s, 0, cx + 0.25 * s, 0);\n    g.addColorStop(0, '#9a9a9a'); g.addColorStop(0.5, '#f4f4f4'); g.addColorStop(1, '#7f7f7f');\n    ctx.fillStyle = g;\n    ctx.beginPath();\n    ctx.moveTo(cx - 0.24 * s, 0.40 * s);\n    ctx.lineTo(cx - 0.205 * s, 0.74 * s);\n    ctx.quadraticCurveTo(cx, 0.84 * s, cx + 0.205 * s, 0.74 * s);\n    ctx.lineTo(cx + 0.24 * s, 0.40 * s);\n    ctx.closePath(); ctx.fill();\n    ctx.fillStyle = '#f7f7f7';\n    ctx.beginPath(); ctx.ellipse(cx, 0.40 * s, 0.24 * s, 0.062 * s, 0, 0, Math.PI * 2); ctx.fill();\n    ctx.fillStyle = '#cfcfcf';\n    ctx.beginPath(); ctx.ellipse(cx, 0.40 * s, 0.19 * s, 0.046 * s, 0, 0, Math.PI * 2); ctx.fill();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
